// Wire contract between the C++ backend and the TypeScript frontend.
// Compiled with protoc (C++) and protoc-gen-es (TypeScript, see
// frontend/buf.gen.yaml).

syntax = "proto3";

package trading.market_data.v1;

// Best bid/offer snapshot for a single symbol.
message BookTicker {
  string symbol = 1;
  double bid_price = 2;
  double bid_qty = 3;
  double ask_price = 4;
  double ask_qty = 5;
  // Capture time, nanoseconds since the Unix epoch.
  fixed64 timestamp_ns = 6;
}

// Envelope for every message pushed over the frontend WebSocket. New event
// kinds (trades, book deltas, indicator outputs) extend the oneof.
message MarketDataEvent {
  oneof payload {
    BookTicker book_ticker = 1;
  }
}
